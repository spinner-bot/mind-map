<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map Editor — 思维导图编辑器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- ============================================================
    Main Layout: Toolbar / Canvas+Preview / Status Bar
    主布局：工具栏 / 画布+预览 / 状态栏
    ============================================================ -->

    <!-- Top Toolbar 顶部工具栏 -->
    <header id="toolbar">
        <div class="toolbar-group">
            <button id="btn-undo" title="Undo / 撤销 (Ctrl+Z)" disabled>↩</button>
            <button id="btn-redo" title="Redo / 重做 (Ctrl+Y)" disabled>↪</button>
        </div>

        <div class="toolbar-separator"></div>

        <div class="toolbar-group">
            <button id="btn-new" title="New / 新建">📄 New</button>
            <button id="btn-open" title="Open / 打开">📂 Open</button>
            <button id="btn-save" title="Save / 保存">💾 Save</button>
        </div>

        <div class="toolbar-separator"></div>

        <div class="toolbar-group">
            <label for="search-input" class="sr-only">Search</label>
            <input type="text" id="search-input" placeholder="Search... / 搜索..."
                   title="Search nodes / 搜索节点">
            <div id="search-results" class="search-dropdown hidden"></div>
        </div>

        <div class="toolbar-group">
            <label for="locate-input" class="sr-only">Locate</label>
            <input type="text" id="locate-input" placeholder="Addr e.g. 1.2.3 / 地址"
                   title="Locate by address / 按地址定位" style="width:140px;">
        </div>

        <div class="toolbar-separator"></div>

        <div class="toolbar-group">
            <button id="btn-zoom-out" title="Zoom Out / 缩小">−</button>
            <span id="zoom-label">100%</span>
            <button id="btn-zoom-in" title="Zoom In / 放大">+</button>
            <button id="btn-zoom-fit" title="Fit All / 适应全部">⊡</button>
        </div>

        <div class="toolbar-spacer"></div>

        <div class="toolbar-group">
            <button id="btn-export" title="Export / 导出">📤 Export</button>
            <button id="btn-config" title="Settings / 设置">⚙</button>
            <select id="lang-select" title="Language / 语言">
                <option value="en">English</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </header>

    <!-- Main Area: Canvas + Preview Panel 主区域：画布 + 预览面板 -->
    <main id="main-area">
        <!-- Mind Map Canvas 思维导图画布 -->
        <div id="canvas-container">
            <canvas id="mindmap-canvas"></canvas>
            <!-- Resize handle for preview panel 预览面板大小调整手柄 -->
            <div id="panel-resizer"></div>
        </div>

        <!-- Node Preview Panel (shown when node selected) 节点预览面板 -->
        <aside id="preview-panel" class="collapsed">
            <div class="panel-header">
                <h3 id="panel-title">Node Info / 节点信息</h3>
                <button id="btn-close-panel" title="Close / 关闭">✕</button>
            </div>
            <div class="panel-body">
                <div class="info-row">
                    <span class="info-label">Address / 地址:</span>
                    <span id="info-addr" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Content / 内容:</span>
                    <span id="info-content" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Children / 子节点:</span>
                    <span id="info-children" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Characters / 字符数:</span>
                    <span id="info-chars" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Format / 格式:</span>
                    <span id="info-format" class="info-value">Plain Text</span>
                </div>
                <div class="info-actions">
                    <button id="btn-edit-content">Edit / 编辑</button>
                    <button id="btn-add-child">Add Child / 加子节点</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Bottom Status Bar 底部状态栏 -->
    <footer id="status-bar">
        <span id="status-stats">0 Layers / 层, 0 Nodes / 节点</span>
        <span class="status-sep">|</span>
        <span id="status-size">0 KB</span>
        <span class="status-sep">|</span>
        <span id="status-chars">0 chars / 字符</span>
        <span class="status-spacer"></span>
        <span id="status-brand">浪兮 mind map | <a href="https://github.com/spinner-bot/mind-map" target="_blank">github.com/spinner-bot/mind-map</a></span>
    </footer>

    <!-- Hidden: File input for opening files 隐藏：文件选择器 -->
    <input type="file" id="file-input" accept=".lxmm,.json,.txt,.md" style="display:none;">

    <!-- Scripts 加载脚本 (v=2 防浏览器缓存旧版 JS) -->
    <script src="/js/i18n.js?v=2"></script>
    <script src="/js/api.js?v=2"></script>
    <script src="/js/renderer.js?v=2"></script>
    <script src="/js/interaction.js?v=2"></script>
    <script src="/js/menus.js?v=2"></script>
    <script src="/js/undo.js?v=2"></script>
    <script src="/js/search.js?v=2"></script>
    <script src="/js/app.js?v=2"></script>
</body>
</html>
